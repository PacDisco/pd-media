[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Friendlier API paths: /api/<name> → /.netlify/functions/<name>
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# Service worker MUST be served from the root scope so it can control the whole app.
# Netlify serves /service-worker.js from /public/service-worker.js by default — no rule needed.

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    # Service workers must NEVER be cached aggressively or you'll be stuck on a broken
    # version after a bad deploy.
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

# Standard hardening for the rest of the app
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# The public family gallery is meant to be embedded inside the student portal,
# so we override the frame policy for that one page only. Using CSP
# frame-ancestors instead of X-Frame-Options because CSP allows a list of
# permitted origins.
[[headers]]
  for = "/gallery.html"
  [headers.values]
    X-Frame-Options = ""
    Content-Security-Policy = "frame-ancestors 'self' https://*.pacificdiscovery.org https://*.netlify.app"
